name: Build binaries

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container: devkitpro/devkitppc:20260503
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js for act compatibility
        if: ${{ env.ACT == 'true' }}
        run: |
          apt-get update
          apt-get install -y nodejs
          echo ${{ env.ACT }}

      - name: Add safe directory exception for git inside the container
        run: git config --global --add safe.directory $(pwd)

      - name: Compile
        run: make -j$(nproc)

      - name: Package
        run: |
          mkdir -p staging/apps/wiiflorked_forwarder/
          cp meta.xml staging/apps/wiiflorked_forwarder/meta.xml
          cp wiiflorked-forwarder.dol staging/apps/wiiflorked_forwarder/boot.dol
          cp "Wiiflow - JDWF - Forwarder.wad" staging/

          echo "sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with: 
          name: wiiflorked_forwarder_${{ env.sha }}
          path: staging/

      - name: Zip release payload
        if: github.event_name == 'push' && env.ACT != 'true'
        run: |
          apt-get update && apt-get install -y zip curl
          cd staging
          zip -r ../forwarder_wiiflorked_${{ env.sha }}.zip apps/ "Wiiflow - JDWF - Forwarder.wad"
          cd ..

      - name: Create Release
        if: github.event_name == 'push' && env.ACT != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch gh CLI manually since it's not in the devkitpro image
          curl -sSL https://github.com/cli/cli/releases/download/v2.49.0/gh_2.49.0_linux_amd64.tar.gz | tar xz -C /tmp
          mv /tmp/gh_2.49.0_linux_amd64/bin/gh /usr/local/bin/
          
          gh release create "build-${{ env.sha }}" forwarder_wiiflorked_${{ env.sha }}.zip \
            --title "forwarder_wiiflorked_${{ env.sha }}" \
            --notes "Automated build generated from commit ${{ env.sha }}" \
            --latest